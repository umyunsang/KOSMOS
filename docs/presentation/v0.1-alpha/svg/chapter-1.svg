<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e0748"/>
      <stop offset="60%" style="stop-color:#2d1259"/>
      <stop offset="100%" style="stop-color:#3b0764"/>
    </linearGradient>
    <linearGradient id="ufo-body-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c4b5fd"/>
      <stop offset="50%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="card-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b0764;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#1e0748;stop-opacity:0.9"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-sm">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg-grad)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.05" stroke="#a78bfa" stroke-width="1">
    <line x1="0" y1="120" x2="1280" y2="120"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="0" y1="360" x2="1280" y2="360"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="0" y1="600" x2="1280" y2="600"/>
    <line x1="160" y1="0" x2="160" y2="720"/>
    <line x1="320" y1="0" x2="320" y2="720"/>
    <line x1="480" y1="0" x2="480" y2="720"/>
    <line x1="640" y1="0" x2="640" y2="720"/>
    <line x1="800" y1="0" x2="800" y2="720"/>
    <line x1="960" y1="0" x2="960" y2="720"/>
    <line x1="1120" y1="0" x2="1120" y2="720"/>
  </g>

  <!-- Left side: UFO Mascot -->
  <!-- UFO beam -->
  <polygon points="120,290 220,290 200,420 140,420" fill="#a78bfa" opacity="0.12"/>
  <polygon points="130,290 210,290 196,380 144,380" fill="#a78bfa" opacity="0.08"/>

  <!-- UFO dish (bottom) -->
  <ellipse cx="170" cy="292" rx="80" ry="18" fill="#5b21b6"/>
  <ellipse cx="170" cy="289" rx="75" ry="16" fill="url(#ufo-body-grad)"/>

  <!-- UFO dome (top) -->
  <path d="M 110 285 Q 110 235 170 228 Q 230 235 230 285 Z" fill="#c4b5fd" opacity="0.9"/>
  <path d="M 125 280 Q 125 248 170 243 Q 215 248 215 280 Z" fill="#e9d5ff" opacity="0.6"/>

  <!-- UFO lights -->
  <circle cx="130" cy="292" r="6" fill="#10b981" filter="url(#glow-sm)"/>
  <circle cx="155" cy="296" r="6" fill="#f59e0b" filter="url(#glow-sm)"/>
  <circle cx="185" cy="297" r="6" fill="#f87171" filter="url(#glow-sm)"/>
  <circle cx="210" cy="293" r="6" fill="#10b981" filter="url(#glow-sm)"/>

  <!-- Landing lights (bottom of beam) -->
  <circle cx="150" cy="418" r="4" fill="#a78bfa" opacity="0.6"/>
  <circle cx="165" cy="422" r="3" fill="#a78bfa" opacity="0.4"/>
  <circle cx="180" cy="420" r="4" fill="#a78bfa" opacity="0.5"/>

  <!-- Brand glyph ✻ big -->
  <text x="168" y="268" font-size="22" fill="#e9d5ff" text-anchor="middle" font-family="serif" filter="url(#glow-sm)">✻</text>

  <!-- KOSMOS Logo area: right of UFO -->
  <text x="290" y="130" font-size="72" font-weight="700" fill="#e9d5ff"
    font-family="'Apple SD Gothic Neo','Pretendard','Noto Sans KR',sans-serif"
    filter="url(#glow)" letter-spacing="6">KOSMOS</text>
  <text x="293" y="160" font-size="22" fill="#c4b5fd"
    font-family="'Apple SD Gothic Neo','Pretendard','Noto Sans KR',sans-serif"
    letter-spacing="2">✻  v0.1-alpha  ·  KSC 2026</text>

  <!-- Horizontal divider -->
  <line x1="290" y1="178" x2="1220" y2="178" stroke="#7c3aed" stroke-width="1.5" opacity="0.6"/>

  <!-- One-liner definition -->
  <text x="290" y="218" font-size="26" font-weight="600" fill="#ddd6fe"
    font-family="'Apple SD Gothic Neo','Pretendard','Noto Sans KR',sans-serif">
    한국 공공 API를 자연어로 만나는 시민 대화형 AI 플랫폼
  </text>

  <!-- Scenario cards: 3 cards below -->
  <!-- Card 1: Safe Route -->
  <rect x="290" y="258" width="288" height="210" rx="14" fill="url(#card-grad)" stroke="#7c3aed" stroke-width="1.5"/>
  <rect x="290" y="258" width="288" height="36" rx="14" fill="#5b21b6" opacity="0.7"/>
  <rect x="290" y="280" width="288" height="14" rx="0" fill="#5b21b6" opacity="0.7"/>
  <text x="306" y="282" font-size="13" font-weight="700" fill="#10b981"
    font-family="'Apple SD Gothic Neo','Pretendard','Noto Sans KR',sans-serif">안전 경로</text>
  <text x="356" y="282" font-size="12" fill="#a78bfa"
    font-family="'Apple SD Gothic Neo','Pretendard','Noto Sans KR',sans-serif">KOROAD + KMA</text>

  <text x="306" y="312" font-size="13" fill="#c4b5fd"
    font-family="'Apple SD Gothic Neo','Pretendard','Noto Sans KR',sans-serif">시민:</text>
  <text x="336" y="312" font-size="13" fill="#e9d5ff"
    font-family="'Apple SD Gothic Neo','Pretendard','Noto Sans KR',sans-serif">"내일 부산→서울, 안전한</text>
  <text x="336" y="330" font-size="13" fill="#e9d5ff"
    font-family="'Apple SD Gothic Neo','Pretendard','Noto Sans KR',sans-serif">경로 추천해줘"</text>

  <line x1="306" y1="342" x2="562" y2="342" stroke="#7c3aed" stroke-width="1" opacity="0.5"/>

  <text x="306" y="362" font-size="12" fill="#a78bfa"
    font-family="'Apple SD Gothic Neo','Pretendard','Noto Sans KR',sans-serif">KOSMOS:</text>
  <text x="306" y="380" font-size="12" fill="#ddd6fe"
    font-family="'Apple SD Gothic Neo','Pretendard','Noto Sans KR',sans-serif">교통사고 위험 구간 + 기상 특보</text>
  <text x="306" y="398" font-size="12" fill="#ddd6fe"
    font-family="'Apple SD Gothic Neo','Pretendard','Noto Sans KR',sans-serif">융합 → 위험 등급 + 우회로 추천</text>

  <rect x="306" y="416" width="82" height="22" rx="4" fill="#10b981" opacity="0.2"/>
  <text x="347" y="431" font-size="11" fill="#10b981" text-anchor="middle"
    font-family="'Apple SD Gothic Neo','Pretendard','Noto Sans KR',sans-serif">도로 위험도</text>
  <rect x="396" y="416" width="82" height="22" rx="4" fill="#10b981" opacity="0.2"/>
  <text x="437" y="431" font-size="11" fill="#10b981" text-anchor="middle"
    font-family="'Apple SD Gothic Neo','Pretendard','Noto Sans KR',sans-serif">우회 경로</text>

  <!-- Card 2: Night Emergency -->
  <rect x="596" y="258" width="288" height="210" rx="14" fill="url(#card-grad)" stroke="#7c3aed" stroke-width="1.5"/>
  <rect x="596" y="258" width="288" height="36" rx="14" fill="#5b21b6" opacity="0.7"/>
  <rect x="596" y="280" width="288" height="14" rx="0" fill="#5b21b6" opacity="0.7"/>
  <text x="612" y="282" font-size="13" font-weight="700" fill="#f87171"
    font-family="'Apple SD Gothic Neo','Pretendard','Noto Sans KR',sans-serif">야간 응급실</text>
  <text x="668" y="282" font-size="12" fill="#a78bfa"
    font-family="'Apple SD Gothic Neo','Pretendard','Noto Sans KR',sans-serif">119 + HIRA</text>

  <text x="612" y="312" font-size="13" fill="#c4b5fd"
    font-family="'Apple SD Gothic Neo','Pretendard','Noto Sans KR',sans-serif">시민:</text>
  <text x="642" y="312" font-size="13" fill="#e9d5ff"
    font-family="'Apple SD Gothic Neo','Pretendard','Noto Sans KR',sans-serif">"아이 고열, 근처 야간</text>
  <text x="642" y="330" font-size="13" fill="#e9d5ff"
    font-family="'Apple SD Gothic Neo','Pretendard','Noto Sans KR',sans-serif">응급실 어디야?"</text>

  <line x1="612" y1="342" x2="868" y2="342" stroke="#7c3aed" stroke-width="1" opacity="0.5"/>

  <text x="612" y="362" font-size="12" fill="#a78bfa"
    font-family="'Apple SD Gothic Neo','Pretendard','Noto Sans KR',sans-serif">KOSMOS:</text>
  <text x="612" y="380" font-size="12" fill="#ddd6fe"
    font-family="'Apple SD Gothic Neo','Pretendard','Noto Sans KR',sans-serif">위치 기반 응급실 검색 +</text>
  <text x="612" y="398" font-size="12" fill="#ddd6fe"
    font-family="'Apple SD Gothic Neo','Pretendard','Noto Sans KR',sans-serif">실시간 대기시간 융합 제공</text>

  <rect x="612" y="416" width="82" height="22" rx="4" fill="#f87171" opacity="0.2"/>
  <text x="653" y="431" font-size="11" fill="#f87171" text-anchor="middle"
    font-family="'Apple SD Gothic Neo','Pretendard','Noto Sans KR',sans-serif">응급실 위치</text>
  <rect x="702" y="416" width="82" height="22" rx="4" fill="#f87171" opacity="0.2"/>
  <text x="743" y="431" font-size="11" fill="#f87171" text-anchor="middle"
    font-family="'Apple SD Gothic Neo','Pretendard','Noto Sans KR',sans-serif">대기시간</text>

  <!-- Card 3: Birth Subsidy -->
  <rect x="902" y="258" width="288" height="210" rx="14" fill="url(#card-grad)" stroke="#7c3aed" stroke-width="1.5"/>
  <rect x="902" y="258" width="288" height="36" rx="14" fill="#5b21b6" opacity="0.7"/>
  <rect x="902" y="280" width="288" height="14" rx="0" fill="#5b21b6" opacity="0.7"/>
  <text x="918" y="282" font-size="13" font-weight="700" fill="#f59e0b"
    font-family="'Apple SD Gothic Neo','Pretendard','Noto Sans KR',sans-serif">출산 보조금</text>
  <text x="978" y="282" font-size="12" fill="#a78bfa"
    font-family="'Apple SD Gothic Neo','Pretendard','Noto Sans KR',sans-serif">MOHW + Gov24</text>

  <text x="918" y="312" font-size="13" fill="#c4b5fd"
    font-family="'Apple SD Gothic Neo','Pretendard','Noto Sans KR',sans-serif">시민:</text>
  <text x="948" y="312" font-size="13" fill="#e9d5ff"
    font-family="'Apple SD Gothic Neo','Pretendard','Noto Sans KR',sans-serif">"출산 보조금 신청하고</text>
  <text x="948" y="330" font-size="13" fill="#e9d5ff"
    font-family="'Apple SD Gothic Neo','Pretendard','Noto Sans KR',sans-serif">싶은데"</text>

  <line x1="918" y1="342" x2="1174" y2="342" stroke="#7c3aed" stroke-width="1" opacity="0.5"/>

  <text x="918" y="362" font-size="12" fill="#a78bfa"
    font-family="'Apple SD Gothic Neo','Pretendard','Noto Sans KR',sans-serif">KOSMOS:</text>
  <text x="918" y="380" font-size="12" fill="#ddd6fe"
    font-family="'Apple SD Gothic Neo','Pretendard','Noto Sans KR',sans-serif">자격 확인 + 필요 서류 안내</text>
  <text x="918" y="398" font-size="12" fill="#ddd6fe"
    font-family="'Apple SD Gothic Neo','Pretendard','Noto Sans KR',sans-serif">+ 온라인 신청 가이드 제공</text>

  <rect x="918" y="416" width="82" height="22" rx="4" fill="#f59e0b" opacity="0.2"/>
  <text x="959" y="431" font-size="11" fill="#f59e0b" text-anchor="middle"
    font-family="'Apple SD Gothic Neo','Pretendard','Noto Sans KR',sans-serif">자격 확인</text>
  <rect x="1008" y="416" width="82" height="22" rx="4" fill="#f59e0b" opacity="0.2"/>
  <text x="1049" y="431" font-size="11" fill="#f59e0b" text-anchor="middle"
    font-family="'Apple SD Gothic Neo','Pretendard','Noto Sans KR',sans-serif">신청 가이드</text>

  <!-- Connecting label between cards -->
  <text x="640" y="246" font-size="14" fill="#7c3aed" text-anchor="middle"
    font-family="'Apple SD Gothic Neo','Pretendard','Noto Sans KR',sans-serif">시민 시나리오 3종 — 부처를 몰라도, KOSMOS가 API를 연결한다</text>

  <!-- Bottom meta bar -->
  <rect x="0" y="648" width="1280" height="72" fill="#1e0748" opacity="0.95"/>
  <line x1="0" y1="648" x2="1280" y2="648" stroke="#7c3aed" stroke-width="1.5"/>

  <!-- Bottom meta items -->
  <rect x="30" y="664" width="160" height="26" rx="6" fill="#3b0764" stroke="#7c3aed" stroke-width="1"/>
  <text x="110" y="681" font-size="12" fill="#c4b5fd" text-anchor="middle"
    font-family="'Apple SD Gothic Neo','Pretendard','Noto Sans KR',sans-serif">K-EXAONE-236B-A23B</text>

  <rect x="202" y="664" width="170" height="26" rx="6" fill="#3b0764" stroke="#7c3aed" stroke-width="1"/>
  <text x="287" y="681" font-size="12" fill="#c4b5fd" text-anchor="middle"
    font-family="'Apple SD Gothic Neo','Pretendard','Noto Sans KR',sans-serif">FriendliAI Serverless</text>

  <rect x="384" y="664" width="108" height="26" rx="6" fill="#3b0764" stroke="#7c3aed" stroke-width="1"/>
  <text x="438" y="681" font-size="12" fill="#c4b5fd" text-anchor="middle"
    font-family="'Apple SD Gothic Neo','Pretendard','Noto Sans KR',sans-serif">Apache-2.0</text>

  <rect x="504" y="664" width="140" height="26" rx="6" fill="#3b0764" stroke="#7c3aed" stroke-width="1"/>
  <text x="574" y="681" font-size="12" fill="#c4b5fd" text-anchor="middle"
    font-family="'Apple SD Gothic Neo','Pretendard','Noto Sans KR',sans-serif">학생 포트폴리오</text>

  <text x="1240" y="684" font-size="13" fill="#7c3aed" text-anchor="end"
    font-family="'Apple SD Gothic Neo','Pretendard','Noto Sans KR',sans-serif">✻ KOSMOS</text>
</svg>
