name: Retrieval Quality Gate

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: eval-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  retrieval-eval:
    name: BM25 Retrieval Eval (recall@5 gate)
    runs-on: ubuntu-latest
    # No live API keys set — eval uses in-memory BM25 only, no HTTP calls.
    env:
      OTEL_SDK_DISABLED: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --frozen --all-extras --dev

      - name: Run retrieval evaluation
        # Exit 0 = pass (recall@5 >= 80%), 1 = warn ([60%, 80%)), 2 = fail (< 60%).
        # Workflow fails on exit 1 and 2 so the PR check is blocked.
        # NOTE: When only KOROAD is registered (Stage 2a), overall recall@5 will be
        # low (~33%) because 20/30 queries target unregistered adapters.
        # The harness emits a WARN in the JSON report but does not treat a low recall
        # as a fatal misconfiguration — it exits with the appropriate code so the
        # PR check reflects reality.  Stage 3 registration will push recall to >= 80%.
        run: uv run python -m kosmos.eval.retrieval eval/retrieval_queries.yaml

      - name: Upload eval report artifact
        # Always upload the report so reviewers can inspect it even on failure.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: retrieval-eval-report
          path: .eval-artifacts/retrieval.json
          retention-days: 30

      - name: Post eval summary
        if: always()
        run: |
          REPORT=".eval-artifacts/retrieval.json"
          if [ -f "$REPORT" ]; then
            RECALL5=$(python -c "import json; d=json.load(open('$REPORT')); print(f\"{d['recall_at_5']:.2%}\")")
            RECALL1=$(python -c "import json; d=json.load(open('$REPORT')); print(f\"{d['recall_at_1']:.2%}\")")
            TOTAL=$(python -c "import json; d=json.load(open('$REPORT')); print(d['total_queries'])")
            REG_SIZE=$(python -c "import json; d=json.load(open('$REPORT')); print(d['registry_size'])")
            WARNINGS=$(python -c "import json; d=json.load(open('$REPORT')); w=d.get('warnings',[]); print('\\n'.join(w) if w else 'none')")

            cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## BM25 Retrieval Quality Gate

          | Metric | Value |
          |--------|-------|
          | recall@5 | $RECALL5 |
          | recall@1 | $RECALL1 |
          | Total queries | $TOTAL |
          | Registry size | $REG_SIZE |

          ### Gate thresholds
          - \`recall@5 >= 80%\` → **PASS**
          - \`60% <= recall@5 < 80%\` → **WARN** (CI fails)
          - \`recall@5 < 60%\` → **FAIL** (CI fails)

          ### Warnings
          \`\`\`
          $WARNINGS
          \`\`\`
          EOF
          else
            echo "No eval report found at $REPORT" >> "$GITHUB_STEP_SUMMARY"
          fi
