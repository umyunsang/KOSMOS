name: shadow-eval

on:
  pull_request:
    paths:
      - "prompts/**"

permissions:
  contents: read

jobs:
  shadow-eval:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve merge-base (main vs PR head)
        id: merge-base
        run: |
          # actions/checkout@v6 with fetch-depth: 0 already provides full history,
          # so a plain fetch is enough to refresh origin/<base_ref>. Do NOT pass
          # --depth=0 (git rejects 0 as non-positive).
          git fetch origin "${{ github.base_ref }}"
          MERGE_BASE=$(git merge-base "origin/${{ github.base_ref }}" "${{ github.event.pull_request.head.sha }}")
          echo "sha=${MERGE_BASE}" >> "$GITHUB_OUTPUT"
          echo "Merge-base for main run: ${MERGE_BASE}"

      # Preserve the battery code from PR head before we rewind the working
      # tree to merge-base.  The battery is a test harness: its *code* must be
      # PR-head-pinned so it behaves identically across both runs, while the
      # *target* it evaluates (prompts, model config) is what legitimately
      # differs between main and shadow.  On the bootstrap PR that introduces
      # the battery, merge-base has no `tests/shadow_eval/` directory at all,
      # so without this step `python -m tests.shadow_eval.battery` would fail
      # with ModuleNotFoundError during the main-environment run.
      - name: Preserve battery code from PR head
        run: |
          mkdir -p /tmp/battery-code
          cp -r tests/shadow_eval /tmp/battery-code/shadow_eval

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      # --- main environment run: executes against merge-base checkout ---
      - name: Checkout merge-base for main run
        run: git checkout "${{ steps.merge-base.outputs.sha }}"

      - name: Restore battery code into merge-base tree
        run: |
          # Physically graft the PR-head battery into the merge-base tests/
          # package so `python -m tests.shadow_eval.battery` resolves via the
          # normal sys.path[0]=cwd lookup.  This bypasses the PYTHONPATH
          # shadowing caused by merge-base's pre-existing tests/__init__.py.
          mkdir -p tests
          [ -f tests/__init__.py ] || : > tests/__init__.py
          cp -r /tmp/battery-code/shadow_eval tests/shadow_eval

      - name: Install dependencies (merge-base)
        run: uv sync --frozen --all-extras --dev

      - name: Run battery (main environment)
        run: uv run python -m tests.shadow_eval.battery --environment main --out /tmp/main.json

      # --- shadow environment run: executes against PR head checkout ---
      # The graft step above left tests/shadow_eval/ as untracked files in the
      # merge-base working tree.  PR head has those same paths tracked, so a
      # plain `git checkout` aborts with "untracked working tree files would be
      # overwritten".  Remove the graft before switching so checkout can
      # restore the tracked originals cleanly.
      - name: Clean grafted battery before PR-head checkout
        run: rm -rf tests/shadow_eval

      - name: Checkout PR head for shadow run
        # ``git checkout <sha>`` (no --) only switches HEAD; it does not
        # restore tracked files that were `rm -rf`'d in the previous step.
        # Empirically this surfaced as `ModuleNotFoundError: No module named
        # 'tests.shadow_eval'` on PR #2203 even though tests/shadow_eval/ is
        # tracked at the PR head. Force-restore the working tree from the
        # target commit so every tracked file (including the previously
        # grafted-then-removed shadow_eval directory) is materialised.
        run: |
          git checkout --force "${{ github.event.pull_request.head.sha }}"
          git restore --source="${{ github.event.pull_request.head.sha }}" --worktree -- tests/shadow_eval
          ls -la tests/shadow_eval/__init__.py tests/__init__.py

      - name: Install dependencies (PR head)
        run: uv sync --frozen --all-extras --dev

      - name: Run battery (shadow environment)
        run: uv run python -m tests.shadow_eval.battery --environment shadow --out /tmp/shadow.json

      - name: Merge eval reports
        run: |
          jq -s '{ main: .[0], shadow: .[1] }' /tmp/main.json /tmp/shadow.json > eval-report.json

      - name: Upload eval report
        uses: actions/upload-artifact@v4
        with:
          name: shadow-eval-report
          path: eval-report.json
          retention-days: 14
