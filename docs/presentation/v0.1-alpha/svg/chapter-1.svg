    <line x1="0" y1="360" x2="1280" y2="360" stroke="#a78bfa" stroke-width="0.5"/>
    <line x1="0" y1="540" x2="1280" y2="540" stroke="#a78bfa" stroke-width="0.5"/>
    <line x1="320" y1="0" x2="320" y2="720" stroke="#a78bfa" stroke-width="0.5"/>
    <line x1="640" y1="0" x2="640" y2="720" stroke="#a78bfa" stroke-width="0.5"/>
    <line x1="960" y1="0" x2="960" y2="720" stroke="#a78bfa" stroke-width="0.5"/>
  </g>

  <!-- Top header bar -->
