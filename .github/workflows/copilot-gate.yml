name: Copilot Review Gate

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
    branches: [main]
  pull_request_review:
    types: [submitted]

permissions:
  checks: write
  pull-requests: read

jobs:
  # Phase 1: Create a "pending" check run when a PR is opened or updated.
  # On synchronize (new push), this resets the gate back to pending so
  # Copilot re-reviews the updated code.
  create-pending:
    name: Copilot Review Pending
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Skip for Dependabot
        if: github.actor == 'dependabot[bot]'
        run: echo "Dependabot PR — skipping Copilot gate."

      - name: Create pending check run
        if: github.actor != 'dependabot[bot]'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'Copilot Review Gate',
              head_sha: context.payload.pull_request.head.sha,
              status: 'in_progress',
              output: {
                title: 'Waiting for Copilot Code Review',
                summary: 'Copilot has not submitted a review yet. This check will pass when Copilot finds no issues.'
              }
            });

  # Phase 2: When Copilot submits a review, count its inline comments.
  # Copilot always uses state="commented" (never "approved"/"changes_requested"),
  # so we determine pass/fail by checking if it left any inline review comments.
  #   0 comments → pass (clean review)
  #   1+ comments → fail (issues found, fix and push to trigger re-review)
  evaluate-review:
    name: Copilot Review Evaluate
    if: >-
      github.event_name == 'pull_request_review' &&
      github.event.review.user.login == 'copilot-pull-request-reviewer[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate Copilot review
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const sha = context.payload.pull_request.head.sha;

            // Fetch all review comments from Copilot on this PR
            const { data: comments } = await github.rest.pulls.listReviewComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });

            const copilotComments = comments.filter(
              c => c.user.login === 'copilot-pull-request-reviewer[bot]'
                && c.commit_id === sha
            );

            const count = copilotComments.length;
            let conclusion, title, summary;

            if (count === 0) {
              conclusion = 'success';
              title = 'Copilot review passed — no issues found';
              summary = 'Copilot Code Review completed with no inline comments on the latest commit.';
            } else {
              conclusion = 'failure';
              title = `Copilot found ${count} issue${count > 1 ? 's' : ''}`;
              summary = [
                `Copilot Code Review left ${count} inline comment${count > 1 ? 's' : ''} on this commit.`,
                'Address the comments and push fixes to trigger a re-review.',
                '',
                '**Comments:**',
                ...copilotComments.map(c => `- \`${c.path}:${c.line || c.original_line}\` — ${c.body.split('\n')[0].slice(0, 120)}`)
              ].join('\n');
            }

            // Find existing in_progress check run and complete it,
            // or create a new completed check run.
            const { data: checkRuns } = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: sha,
              check_name: 'Copilot Review Gate',
              filter: 'latest'
            });

            const pending = checkRuns.check_runs.find(cr => cr.status !== 'completed');

            if (pending) {
              await github.rest.checks.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                check_run_id: pending.id,
                status: 'completed',
                conclusion,
                output: { title, summary }
              });
              core.info(`Updated check run ${pending.id} → ${conclusion}`);
            } else {
              await github.rest.checks.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'Copilot Review Gate',
                head_sha: sha,
                status: 'completed',
                conclusion,
                output: { title, summary }
              });
              core.info(`Created completed check run → ${conclusion}`);
            }

            if (conclusion === 'failure') {
              core.setFailed(title);
            }
