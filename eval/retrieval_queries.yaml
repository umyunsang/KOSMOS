# eval/retrieval_queries.yaml
# 30-query BM25 retrieval evaluation set — T038
#
# Schema per entry:
#   id: str                  # Unique query identifier (Q001-Q030)
#   query: str               # Natural-language Korean or English query
#   expected_tool_id: str    # The adapter that should rank in top-K
#   notes: str (optional)    # Rationale for the expected match
#
# Coverage plan (per research.md §5.2):
#   KOROAD (10): koroad_accident_hazard_search
#   KMA    ( 7): kma_forecast_fetch
#   HIRA   ( 7): hira_hospital_search
#   NMC    ( 6): nmc_emergency_search
#
# WARNING: The eval harness registers all 4 seed adapters directly.
# If any adapter fails to register, the harness emits a WARN in the JSON
# report and recall for that adapter will be zero.
version: 1
queries:
  # -----------------------------------------------------------------------
  # KOROAD (10 queries) — koroad_accident_hazard_search
  # -----------------------------------------------------------------------
  - id: Q001
    query: "교통사고 위험지역 알려줘"
    expected_tool_id: koroad_accident_hazard_search
    notes: "Canonical KOROAD phrasing — direct keyword match"

  - id: Q002
    query: "traffic accident hotspots"
    expected_tool_id: koroad_accident_hazard_search
    notes: "English equivalent — tests bilingual hint"

  - id: Q003
    query: "사고 많이 나는 곳 어디야"
    expected_tool_id: koroad_accident_hazard_search
    notes: "Indirect phrasing — high accident frequency, synonymous"

  - id: Q004
    query: "accident blackspots near me"
    expected_tool_id: koroad_accident_hazard_search
    notes: "English synonym phrasing for hotspots"

  - id: Q005
    query: "서울 강남구 사고다발구역"
    expected_tool_id: koroad_accident_hazard_search
    notes: "Location + topic phrasing with adm_cd context"

  - id: Q006
    query: "위험 도로 조심해야 하는 구간"
    expected_tool_id: koroad_accident_hazard_search
    notes: "Paraphrase — dangerous road section"

  - id: Q007
    query: "교통 위험지점 행정동코드로 조회"
    expected_tool_id: koroad_accident_hazard_search
    notes: "Direct reference to adm_cd input — strong match"

  - id: Q008
    query: "dangerous intersections Korea road safety"
    expected_tool_id: koroad_accident_hazard_search
    notes: "English edge phrasing with Korea context"

  - id: Q009
    query: "2024년 교통사고 위험지역 통계"
    expected_tool_id: koroad_accident_hazard_search
    notes: "Year + topic phrasing"

  - id: Q010
    query: "사고 위험 구역 도로교통공단"
    expected_tool_id: koroad_accident_hazard_search
    notes: "Provider name + topic — tests provider-aware retrieval"

  # -----------------------------------------------------------------------
  # KMA (7 queries) — kma_forecast_fetch
