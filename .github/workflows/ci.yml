name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - "docker/**"
      - "pyproject.toml"
      - "uv.lock"
      - "**"
  push:
    branches: [main]
  merge_group:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv sync --frozen --all-extras --dev
      - name: Ruff check
        run: uv run ruff check src tests
      - name: Ruff format check
        run: uv run ruff format --check src tests
      - name: Mypy strict
        run: uv run mypy src
      - name: Validate prompts/manifest.yaml against JSON Schema
        run: |
          uv run python -c "
          import json, sys, yaml
          from pathlib import Path
          from jsonschema import validate
          manifest = yaml.safe_load(Path('prompts/manifest.yaml').read_text())
          schema = json.loads(Path('specs/026-cicd-prompt-registry/contracts/prompts-manifest.schema.json').read_text())
          validate(instance=manifest, schema=schema)
          print('prompts/manifest.yaml validates against schema')
          "

  test:
    name: Test (Python ${{ matrix.python-version }})
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      OTEL_SDK_DISABLED: "true"
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: ${{ matrix.python-version }}
      - run: uv sync --frozen --all-extras --dev
      - name: Secrets audit (block long-lived tokens in workflows)
        run: ./scripts/audit-secrets.sh
      - name: Env registry drift check
        run: uv run python scripts/audit-env-registry.py
      - name: Fetch secrets from Infisical (OIDC federation)
        uses: Infisical/secrets-action@8802effbe453d0576cd923567dcc2c97a1f54058  # v1.0.15
        with:
          method: oidc
          identity-id: ${{ vars.INFISICAL_CLIENT_ID }}
          project-slug: kosmos-3f-zs
          env-slug: dev
          secret-path: "/"
          export-type: env
      - name: Run tests with coverage
        run: uv run pytest -n auto --cov=src/kosmos --cov-report=xml -m "not live"
      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.xml

  dead-code:
    name: Dead Code Detection
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv sync --frozen --all-extras --dev
      - run: uv run vulture src vulture_whitelist.py --min-confidence 80

  docker-build:
    name: Docker Build
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build image
        run: docker build -f docker/Dockerfile -t kosmos:ci .
      - name: Verify image size <= 2 GB
        run: |
          SIZE_BYTES=$(docker inspect kosmos:ci --format='{{.Size}}')
          MAX_BYTES=$((2 * 1024 * 1024 * 1024))
          echo "Image size: $SIZE_BYTES bytes (limit: $MAX_BYTES bytes)"
          if [ "$SIZE_BYTES" -gt "$MAX_BYTES" ]; then
            echo "::error::Image size $SIZE_BYTES exceeds 2 GB limit"
            exit 1
          fi
      - name: Verify non-root user is UID 1000
        run: |
          UID_IN_CONTAINER=$(docker run --rm kosmos:ci id -u)
          echo "Container UID: $UID_IN_CONTAINER"
          if [ "$UID_IN_CONTAINER" != "1000" ]; then
            echo "::error::Expected UID 1000, got $UID_IN_CONTAINER"
            exit 1
          fi
