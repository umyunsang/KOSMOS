name: Copilot Review Gate

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
    branches: [main]

permissions:
  checks: write
  pull-requests: read

jobs:
  copilot-gate:
    name: Copilot Review Gate
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Create pending check and poll for Copilot review
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = context.payload.pull_request.number;
            const sha = context.payload.pull_request.head.sha;

            // Create an in_progress check run (shows as "pending" in UI)
            const { data: checkRun } = await github.rest.checks.create({
              owner, repo,
              name: 'Copilot Review Gate',
              head_sha: sha,
              status: 'in_progress',
              output: {
                title: 'Waiting for Copilot Code Review',
                summary: 'Polling for Copilot review submission...'
              }
            });
            const checkRunId = checkRun.id;
            core.info(`Created check run ${checkRunId} (in_progress)`);

            // Poll for Copilot review on this exact commit SHA.
            // Copilot typically responds within 1-5 minutes.
            const MAX_ATTEMPTS = 30;       // 30 × 30s = 15 minutes max
            const POLL_INTERVAL_MS = 30000; // 30 seconds

            let copilotReview = null;

            for (let attempt = 1; attempt <= MAX_ATTEMPTS; attempt++) {
              core.info(`Poll attempt ${attempt}/${MAX_ATTEMPTS}...`);

              const { data: reviews } = await github.rest.pulls.listReviews({
                owner, repo,
                pull_number: prNumber
              });

              // Find a Copilot review matching the current head SHA
              copilotReview = reviews.find(
                r => r.user.login === 'copilot-pull-request-reviewer[bot]'
                  && r.commit_id === sha
              );

              if (copilotReview) {
                core.info(`Found Copilot review ${copilotReview.id} at attempt ${attempt}`);
                break;
              }

              if (attempt < MAX_ATTEMPTS) {
                await new Promise(resolve => setTimeout(resolve, POLL_INTERVAL_MS));
              }
            }

            // If no review found after max attempts, pass with warning
            if (!copilotReview) {
              await github.rest.checks.update({
                owner, repo,
                check_run_id: checkRunId,
                status: 'completed',
                conclusion: 'success',
                output: {
                  title: 'Copilot did not review (timeout)',
                  summary: 'Copilot Code Review did not submit a review within 15 minutes. Passing with warning.'
                }
              });
              core.warning('Copilot review timed out — passing by default');
              return;
            }

            // Count inline comments for this specific review
            const { data: reviewComments } = await github.rest.pulls.listCommentsForReview({
              owner, repo,
              pull_number: prNumber,
              review_id: copilotReview.id
            });

            const count = reviewComments.length;
            let conclusion, title, summary;

            if (count === 0) {
              conclusion = 'success';
              title = 'Copilot review passed — no issues found';
              summary = 'Copilot Code Review completed with no inline comments.';
            } else {
              conclusion = 'failure';
              title = `Copilot found ${count} issue${count > 1 ? 's' : ''}`;
              summary = [
                `Copilot Code Review left ${count} inline comment${count > 1 ? 's' : ''}.`,
                'Address the comments and push fixes to trigger a re-review.',
                '',
                '**Issues:**',
                ...reviewComments.map(c =>
                  `- \`${c.path}${c.line ? ':' + c.line : ''}\` — ${c.body.split('\n')[0].slice(0, 120)}`
                )
              ].join('\n');
            }

            await github.rest.checks.update({
              owner, repo,
              check_run_id: checkRunId,
              status: 'completed',
              conclusion,
              output: { title, summary }
            });

            core.info(`Updated check run ${checkRunId} → ${conclusion}`);

            if (conclusion === 'failure') {
              core.setFailed(title);
            }
